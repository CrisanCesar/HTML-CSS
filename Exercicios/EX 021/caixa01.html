<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
            /*  box-level é um elemento que ocupa toda a largura disponível, ou seja, ele tem uma caixa que se estende por toda a largura do seu elemento pai. O box-level é o tipo de elemento mais comum em HTML, e inclui elementos como h1, p, div, etc. */
        h1 {
            /* Jeito de shothand */
            background-color: lightgreen;
            height: 300px;
            width: 300px;
            
            border: 10px solid black;
            padding: 10px;
            margin: 20px auto 20px auto;
            outline: 5px solid blue;
        }
         /*  Inline-level
            O link é um elemento inline, ou seja, ele não tem altura e largura, mas podemos usar as propriedades de borda, padding, margin e outline para criar uma caixa em torno do link. */
        a {
            /* Jeito de longhand */
            background-color: lightblue;
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
            margin-left: 20px;

            outline: 5px solid orange;

        }




    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos tambem são exemplos de box-level, mas os <a href="#">Links são exemplos de caixas inline</a>. Vamos ver como isso tudo funciona.</p>
</body>
</html>
