<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu próprio servidor</p>
    <!-- O atributo "poster" é usado para especificar uma imagem que será exibida antes do vídeo começar a ser reproduzido. -->
    <video autoplay width="500" poster="imagens/paisagem.webp" controls loop>
        <source src="midia/Perfect.webm.webm" type="video/webm">
        <source src="midia/Perfect.mkv.mkv" type="video/mkv">
        <source src="midia/perfect.mp4.mp4" type="video/mp4">
        <source src="midia/perfect.ogv.ogv" type="video/ogg">
        <p>Seu navegador não suporta o elemento de vídeo.</p>
    </video>

    <h1>Inserindo videos do youtube</h1>
    <p>Este video esta hospedado no youtube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=nS0DHEA0cV_qBM59" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
   

</body>
</html>
