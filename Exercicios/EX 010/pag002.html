<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essa é a segunda pagina do meu  site</title>
</head>
<body>
    <h1>Essa é a segunda 
    página do meu site
    </h1>
    <!-- O atributo rel é usado para indicar a relação entre o documento atual e o documento vinculado. O valor do atributo rel pode ser "prev" para indicar que o link é para a página anterior, "next" para indicar que o link é para a próxima página, ou "nofollow" para indicar que os motores de busca não devem seguir o link. -->
    <p>A segunda página esta aqui</p>
    <p>Essa página é um ofericimento <a href="https://www.hostnet.com.br/" target="_blank" rel="nofollow">Hostnet</a></p>
    <p><a href="index.html" rel="prev">Voltar para a primeira página</a></p>

</body>
</html>
