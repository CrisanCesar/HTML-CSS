<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essa é a terceira página do meu site</title>
</head>
<body>
    <h1>terceira página do meu site</h1>
    <!-- O atributo rel é usado para indicar a relação entre o documento atual e o documento vinculado. O valor do atributo rel pode ser "prev" para indicar que o link é para a página anterior, "next" para indicar que o link é para a próxima página, ou "nofollow" para indicar que os motores de busca não devem seguir o link. -->
    <p>Essa é a terceira página</p>
    <p><a href="../index.html" target="_self">Voltar para a página principal</a></p>
</body>
</html>
